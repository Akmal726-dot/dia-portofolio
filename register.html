<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Halaman Register Akmal Jadid Hibrizi" />
  <title>Register | Portfolio Akmal Jadid</title>
  <link rel="stylesheet" href="public/css/style.css?v=1.0.3" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="nav-logo">AJH<span>.</span></div>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html" class="nav-link">Home</a></li>
      <li><a href="login.html" class="nav-link">Login</a></li>
    </ul>
  </nav>
  <main class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <span class="section-label">Daftar</span>
        <h1 class="auth-title">Buat Akun Baru</h1>
        <p class="auth-text">Daftar sekarang dan simpan akun Anda ke database backend. Setelah berhasil, silakan login.</p>
      </div>
      <form id="registerForm" class="auth-form">
        <div class="form-group">
          <label for="registerName">Nama Lengkap</label>
          <input type="text" id="registerName" name="name" placeholder="Nama Anda" required />
          <span class="field-error" id="registerNameError"></span>
        </div>
        <div class="form-group">
          <label for="registerEmail">Email</label>
          <input type="email" id="registerEmail" name="email" placeholder="name@example.com" required />
          <span class="field-error" id="registerEmailError"></span>
        </div>
        <div class="form-group">
          <label for="registerPassword">Password</label>
          <input type="password" id="registerPassword" name="password" placeholder="Password minimal 6 karakter" required />
          <span class="field-error" id="registerPasswordError"></span>
        </div>
        <div class="form-group">
          <label for="registerConfirmPassword">Konfirmasi Password</label>
          <input type="password" id="registerConfirmPassword" name="confirmPassword" placeholder="Ulangi password" required />
          <span class="field-error" id="registerConfirmPasswordError"></span>
        </div>
        <button type="submit" class="btn btn-primary">Daftar</button>
        <div class="form-status" id="registerStatus"></div>
        <p class="auth-footer">Sudah punya akun? <a href="login.html">Login di sini</a></p>
      </form>
    </div>
  </main>
  <script src="public/js/main.js?v=1.0.0"></script>
</body>
</html>
